checks:
  exclude:
    # upstream charts (prometheus, loki, longhorn, metallb) legitimately require
    # host access, privileged containers, and don't set resource limits.
    # these checks are not actionable without forking the charts.
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    - "no-read-only-root-fs"
    - "run-as-non-root"
    - "privilege-escalation-container"
    - "privileged-container"
    - "host-network"
    - "host-pid"
    - "sensitive-host-mounts"
    - "dangling-service"
    - "drop-net-raw-capability"
    - "env-var-secret"
    - "latest-tag"
    - "job-ttl-seconds-after-finished"
    - "liveness-port"
    - "startup-port"
