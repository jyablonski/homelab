# Example: internal API with explicit image override (release name differs from image).
image:
  repository: registry.home:5000/homelab/lotus-api
  tag: "dev"

scale:
  replicas: 2

env:
  LOG_LEVEL: info

secretEnv:
  - name: DATABASE_URL
    secretName: lotus-api
    secretKey: database_url

configMapEnv:
  - name: FEATURE_FLAGS
    configMapName: lotus-api-config
    configMapKey: feature_flags

extraVolumes:
  - name: config
    configMap:
      name: lotus-api-config

extraVolumeMounts:
  - name: config
    mountPath: /config
    readOnly: true

service:
  port: 8000

serviceMonitor:
  enabled: true
