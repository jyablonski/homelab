{{- if .Values.ingress.enabled }}
{{- if not .Values.service.enabled }}
{{- fail "ingress.enabled requires service.enabled" }}
{{- end }}
{{- if eq (len .Values.ingress.hosts) 0 }}
{{- fail "ingress.enabled requires at least one ingress.hosts entry" }}
{{- end }}
{{- $annotations := dict }}
{{- range $key, $value := (.Values.ingress.annotations | default dict) }}
{{- $_ := set $annotations $key $value }}
{{- end }}
{{- if .Values.ingress.traefik.stripPrefix.enabled }}
{{- $middlewareRef := include "workload.traefikStripPrefixMiddlewareRef" . }}
{{- $existingMiddlewares := index $annotations "traefik.ingress.kubernetes.io/router.middlewares" | default "" }}
{{- if $existingMiddlewares }}
{{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" (printf "%s,%s" $existingMiddlewares $middlewareRef) }}
{{- else }}
{{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" $middlewareRef }}
{{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "workload.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workload.labels" . | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    {{- if .host }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: {{ include "workload.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- else }}
    - http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: {{ include "workload.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
