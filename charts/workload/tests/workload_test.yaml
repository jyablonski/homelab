suite: workload deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders a deployment with the requested image, env, and container port
    values:
      - fixtures/deployment-values.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/acme/api:1.2.3
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: info
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: acme-api
                key: database_url
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_FLAG
            valueFrom:
              configMapKeyRef:
                name: acme-config
                key: feature_flag

  - it: renders the default homelab image when repository is omitted
    release:
      name: runner
      namespace: apps
    set:
      image.tag: dev
      service.port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.home:5000/homelab/runner:dev

  - it: sets the component pod label from the release name by default
    release:
      name: runner
      namespace: apps
    set:
      service.port: 8080
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: runner

  - it: omits replicas when autoscaling is enabled
    set:
      image.repository: ghcr.io/acme/api
      image.tag: "1.2.3"
      scale.autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100

  - it: renders an optional hostPort binding for node-local access
    set:
      image.repository: ghcr.io/acme/api
      image.tag: "1.2.3"
      service.port: 8080
      hostPort.enabled: true
      hostPort.port: 10032
      hostPort.hostIP: 127.0.0.1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].hostPort
          value: 10032
      - equal:
          path: spec.template.spec.containers[0].ports[0].hostIP
          value: 127.0.0.1

  - it: renders optional hostAliases for pod DNS overrides
    set:
      service.port: 8080
      hostAliases:
        - ip: 10.0.0.1
          hostnames:
            - example.internal
    asserts:
      - equal:
          path: spec.template.spec.hostAliases[0].ip
          value: 10.0.0.1
      - contains:
          path: spec.template.spec.hostAliases[0].hostnames
          content: example.internal

  - it: renders a deployment strategy when configured
    set:
      deploymentStrategy.type: Recreate
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate
      - equal:
          path: spec.strategy.rollingUpdate
          value: null
---
suite: workload service
templates:
  - templates/service.yaml
tests:
  - it: renders a clusterip service that targets the workload port
    set:
      service.port: 8080
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080

  - it: supports a service port that differs from the container target port
    set:
      service.port: 80
      service.targetPort: 3000
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: 3000

  - it: does not render a service when disabled
    set:
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0
---
suite: workload service account
templates:
  - templates/serviceaccount.yaml
tests:
  - it: creates a service account when requested
    set:
      serviceAccount.create: true
      serviceAccount.name: lotus-api
      serviceAccount.annotations.team: platform
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: lotus-api
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: does not render a service account by default
    asserts:
      - hasDocuments:
          count: 0
---
suite: workload ingress
templates:
  - templates/ingress.yaml
tests:
  - it: renders an ingress with the configured host and class
    values:
      - fixtures/ingress-values.yaml
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: traefik
      - equal:
          path: spec.rules[0].host
          value: lotus.home
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME
  - it: renders a Traefik strip-prefix middleware and annotation for path-routed apps
    values:
      - fixtures/ingress-strip-prefix-values.yaml
    release:
      name: workload-chart-example
      namespace: apps
    asserts:
      - equal:
          path: metadata.annotations
          value:
            traefik.ingress.kubernetes.io/router.middlewares: apps-workload-chart-example-strip-prefix@kubernetescrd
---
suite: workload ingress middleware
templates:
  - templates/ingress-middleware.yaml
tests:
  - it: renders a Traefik strip-prefix middleware for path-routed apps
    values:
      - fixtures/ingress-strip-prefix-values.yaml
    release:
      name: workload-chart-example
      namespace: apps
    asserts:
      - isKind:
          of: Middleware
      - equal:
          path: metadata.name
          value: workload-chart-example-strip-prefix
      - equal:
          path: spec.stripPrefix.prefixes[0]
          value: /workload-chart/api
---
suite: workload hpa
templates:
  - templates/hpa.yaml
tests:
  - it: renders an hpa with cpu utilization targets
    set:
      scale.autoscaling.enabled: true
      scale.autoscaling.minReplicas: 2
      scale.autoscaling.maxReplicas: 4
      scale.autoscaling.targetCPUUtilizationPercentage: 70
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 4
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 70
---
suite: workload servicemonitor
templates:
  - templates/servicemonitor.yaml
tests:
  - it: renders a servicemonitor with a named service port
    set:
      service.enabled: true
      service.port: 8080
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.labels.release
          value: prometheus
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].port
          value: http
---
suite: workload jobs
templates:
  - templates/cronjob.yaml
tests:
  - it: does not render jobs by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a suspended runnable cronjob for manual on-demand runs
    values:
      - fixtures/jobs-values.yaml
    release:
      name: api
      namespace: apps
    documentSelector:
      path: metadata.name
      value: api-print-reminders-rows
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 0 * * *"
      - equal:
          path: spec.suspend
          value: true
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid
      - equal:
          path: metadata.labels["homelab.jacob/runnable"]
          value: "true"
      - equal:
          path: metadata.labels["homelab.jacob/app"]
          value: api
      - equal:
          path: metadata.labels["homelab.jacob/job"]
          value: print-reminders-rows
      - equal:
          path: metadata.annotations["homelab.jacob/description"]
          value: Print reminder table row count
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: ghcr.io/acme/api:1.2.3
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[0]
          value: python
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].args[0]
          value: /app/jobs/print-reminders-rows/main.py
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: info
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: JOB_MODE
            value: dry-run
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: acme-api
                key: database_url
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["homelab.jacob/job"]
          value: print-reminders-rows
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["app.kubernetes.io/component"]
          value: api

  - it: renders an active scheduled cronjob with forbid concurrency
    values:
      - fixtures/jobs-values.yaml
    release:
      name: api
      namespace: apps
    documentSelector:
      path: metadata.name
      value: api-refresh-reminders
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 * * * *"
      - equal:
          path: spec.suspend
          value: false
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: does not render disabled jobs
    values:
      - fixtures/jobs-values.yaml
    release:
      name: api
      namespace: apps
    asserts:
      - hasDocuments:
          count: 2
