nameOverride: ""
fullnameOverride: ""

commonLabels: {}

scale:
  replicas: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage:
    behavior: {}

deploymentStrategy: {}

# Image defaults assume the Helm release name matches apps/<app> and
# make image-build-push SERVICE=<app> (registry.home:5000/homelab/<app>:<tag>).
image:
  registry: registry.home:5000
  project: homelab
  repository: ""
  tag: dev
  pullPolicy: Always

imagePullSecrets: []

command: []
args: []

portName: http

hostPort:
  enabled: false
  port:
  hostIP: ""

env: {}
envFrom: []
secretEnv: []
configMapEnv: []
extraEnv: []

jobs: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe: {}
readinessProbe: {}
startupProbe: {}

podLabels: {}
podAnnotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automount:

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  port:
  targetPort:

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts: []
  tls: []
  traefik:
    stripPrefix:
      enabled: false
      prefixes: []

serviceMonitor:
  enabled: false
  annotations: {}
  labels:
    release: prometheus
  interval: 30s
  scrapeTimeout: ""
  path: /metrics
  scheme: http
  port: ""
  relabelings: []
  metricRelabelings: []

nodeSelector: {}
tolerations: []
affinity: {}
hostAliases: []

extraVolumes: []
extraVolumeMounts: []
