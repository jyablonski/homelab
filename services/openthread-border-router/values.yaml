controllers:
  main:
    replicas: 1
    strategy: Recreate
    pod:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        smart-home: "true"
    containers:
      main:
        image:
          repository: ghcr.io/ownbee/hass-otbr-docker
          tag: 0.3.0
          pullPolicy: IfNotPresent
        env:
          DEVICE: /dev/ttyThread
          BAUDRATE: "460800"
          FLOW_CONTROL: "1"
          OTBR_LOG_LEVEL: notice
          OTBR_REST_PORT: "8081"
          OTBR_WEB: "1"
          OTBR_WEB_PORT: "8080"
          FIREWALL: "1"
          NAT64: "0"
        ports:
          - name: web
            containerPort: 8080
            protocol: TCP
          - name: rest
            containerPort: 8081
            protocol: TCP
        securityContext:
          privileged: true
          capabilities:
            add:
              - IPC_LOCK
              - NET_ADMIN
        probes:
          liveness:
            enabled: true
            type: TCP
            spec:
              initialDelaySeconds: 30
          readiness:
            enabled: true
            type: TCP
          startup:
            enabled: true
            type: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

persistence:
  thread-adapter:
    type: hostPath
    hostPath: /dev/serial/by-id/REPLACE_WITH_THREAD_RCP_ADAPTER
    hostPathType: CharDevice
    globalMounts:
      - path: /dev/ttyThread
  tun:
    type: hostPath
    hostPath: /dev/net/tun
    hostPathType: CharDevice
    globalMounts:
      - path: /dev/net/tun
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /data

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      web:
        port: 8080
        protocol: HTTP
      rest:
        port: 8081
        protocol: HTTP

ingress:
  main:
    className: traefik
    hosts:
      - host: openthread.home
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: web
