replicaCount: 1

updateStrategy:
  type: Recreate

service:
  type: LoadBalancer
  port: 5000
  loadBalancerIP: 192.168.76.250

persistence:
  enabled: true
  size: 20Gi
  storageClass: longhorn
  deleteEnabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enable: true
    labels:
      release: prometheus

ingress:
  enabled: false

podLabels:
  app.kubernetes.io/component: registry

extraEnvVars:
  - name: OTEL_TRACES_EXPORTER
    value: none
