image:
  repository: ghcr.io/blakeblackshear/frigate
  tag: stable

# Storage for recordings
persistence:
  data:
    enabled: true
    storageClass: longhorn
    size: 500Gi # TODO: adjust later down the line
    accessMode: ReadWriteOnce

# Service to access Frigate UI
service:
  type: LoadBalancer
  port: 5000

# Frigate configuration
config: |
  mqtt:
    host: mosquitto  # MQTT broker for Home Assistant
    topic_prefix: frigate
    client_id: frigate

  # Use CPU for detection (or add Coral USB for acceleration)
  detectors:
    cpu:
      type: cpu
      num_threads: 3

  # Camera configurations
  cameras:
    front_door:
      ffmpeg:
        inputs:
          - path: rtsp://admin:your-password@192.168.1.101:554/h264Preview_01_main
            roles:
              - detect
              - record
      detect:
        width: 1920
        height: 1080
        fps: 5  # Lower FPS for detection saves CPU
      record:
        enabled: true
        retain:
          days: 7  # Keep 7 days of recordings
          mode: all  # Record 24/7
        events:
          retain:
            default: 14  # Keep event clips for 14 days
            mode: motion
      snapshots:
        enabled: true
        retain:
          default: 14
    
    garage_door:
      ffmpeg:
        inputs:
          - path: rtsp://admin:your-password@192.168.1.102:554/h264Preview_01_main
            roles: [detect, record]
      detect:
        width: 1920
        height: 1080
        fps: 5
      record:
        enabled: true
        retain:
          days: 7
          mode: all
    
    side_gate:
      ffmpeg:
        inputs:
          - path: rtsp://admin:your-password@192.168.1.103:554/h264Preview_01_main
            roles: [detect, record]
      detect:
        width: 1920
        height: 1080
        fps: 5
      record:
        enabled: true
        retain:
          days: 7
          mode: all
    
    backyard:
      ffmpeg:
        inputs:
          - path: rtsp://admin:your-password@192.168.1.104:554/h264Preview_01_main
            roles: [detect, record]
      detect:
        width: 1920
        height: 1080
        fps: 5
      record:
        enabled: true
        retain:
          days: 7
          mode: motion  # Only record when motion detected (saves space)

# Resource limits (adjust based on Beelink capacity)
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi
