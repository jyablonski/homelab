authentik:
  error_reporting:
    enabled: false

  postgresql:
    host: "postgres.postgres.svc.cluster.local"
    name: "authentik"
    user: "authentik"

  redis:
    host: "authentik-redis-master"

server:
  replicas: 1

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - authentik.home
    path: /
    pathType: Prefix

worker:
  replicas: 1

postgresql:
  enabled: false

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    service:
      type: ClusterIP
