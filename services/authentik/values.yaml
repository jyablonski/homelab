authentik:
  error_reporting:
    enabled: false

  postgresql:
    host: "postgres.postgres.svc.cluster.local"
    name: "authentik"
    user: "authentik"

  redis:
    host: "authentik-redis-master"

server:
  replicas: 1

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Authentik"
      gethomepage.dev/group: "Infrastructure"
      gethomepage.dev/icon: "authentik.png"
      gethomepage.dev/description: "SSO identity provider"
      # Status badge: pod lookup defaults to app.kubernetes.io/name=<ingress name>
      # (authentik-server), which doesn't match the pod labels (authentik).
      gethomepage.dev/app: "authentik"
    hosts:
      - authentik.home
    path: /
    pathType: Prefix

worker:
  replicas: 1

postgresql:
  enabled: false

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    service:
      type: ClusterIP
