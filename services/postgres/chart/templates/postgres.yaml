---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ required "postgres.username is required" .Values.postgres.username | quote }}
  password: {{ required "postgres.password is required" .Values.postgres.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-db-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  database: {{ required "authentik.database.name is required" .Values.authentik.database.name | quote }}
  username: {{ required "authentik.database.username is required" .Values.authentik.database.username | quote }}
  password: {{ required "authentik.database.password is required" .Values.authentik.database.password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ .Release.Namespace }}
data:
  01-authentik.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    psql \
      --username "$POSTGRES_USER" \
      --set=authentik_db_name="$AUTHENTIK_DB_NAME" \
      --set=authentik_db_user="$AUTHENTIK_DB_USER" \
      --set=authentik_db_password="$AUTHENTIK_DB_PASSWORD" <<'SQL'
    CREATE DATABASE :"authentik_db_name";
    CREATE USER :"authentik_db_user" WITH PASSWORD :'authentik_db_password';
    GRANT ALL PRIVILEGES ON DATABASE :"authentik_db_name" TO :"authentik_db_user";
    ALTER DATABASE :"authentik_db_name" OWNER TO :"authentik_db_user";
    SQL
  02-bootstrap.sql: |
{{ .Files.Get "files/bootstrap.sql" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: AUTHENTIK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: authentik-db-secret
                  key: database
            - name: AUTHENTIK_DB_USER
              valueFrom:
                secretKeyRef:
                  name: authentik-db-secret
                  key: username
            - name: AUTHENTIK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-db-secret
                  key: password
            - name: POSTGRES_DB
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: postgres-init
            defaultMode: 0555
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  namespace: {{ .Release.Namespace }}
spec:
  type: LoadBalancer
  {{- with .Values.loadBalancerService.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
