suite: postgres deployment
templates:
  - templates/postgres.yaml
tests:
  - it: should create a secret with postgres credentials
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: postgres-secret
      - equal:
          path: stringData.username
          value: postgres
      - equal:
          path: stringData.password
          value: replace-me

  - it: should create a secret with authentik database credentials
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: authentik-db-secret
      - equal:
          path: stringData.database
          value: authentik
      - equal:
          path: stringData.username
          value: authentik
      - equal:
          path: stringData.password
          value: replace-me

  - it: should create a configmap with init scripts
    documentIndex: 2
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: postgres-init

  - it: should create a headless service for the statefulset
    documentIndex: 3
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: postgres-headless
      - equal:
          path: spec.clusterIP
          value: None

  - it: should create a statefulset with postgres 17 image
    documentIndex: 4
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.serviceName
          value: postgres-headless
      - equal:
          path: spec.template.spec.containers[0].image
          value: "postgres:17"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5432

  - it: should create a 4Gi PVC with longhorn storage class
    documentIndex: 4
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: longhorn
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 4Gi

  - it: should have a readiness probe
    documentIndex: 4
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should mount data and init volumes
    documentIndex: 4
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 2

  - it: should create a ClusterIP service
    documentIndex: 5
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: postgres
      - isNull:
          path: spec.type

  - it: should create a LoadBalancer service
    documentIndex: 6
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: postgres-lb
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: spec.loadBalancerIP
          value: 192.168.76.243

  - it: should have configmap with authentik bootstrap script
    documentIndex: 2
    asserts:
      - matchRegex:
          path: data["01-authentik.sh"]
          pattern: "CREATE DATABASE"
      - matchRegex:
          path: data["01-authentik.sh"]
          pattern: "CREATE USER"
      - notMatchRegex:
          path: data["01-authentik.sh"]
          pattern: "PASSWORD 'password'"
      - isNotEmpty:
          path: data["02-bootstrap.sql"]

  - it: should reference the correct secret in deployment env vars
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: postgres-secret
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: username
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: postgres-secret
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.key
          value: password
      - equal:
          path: spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.name
          value: authentik-db-secret
      - equal:
          path: spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.key
          value: database
      - equal:
          path: spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.name
          value: authentik-db-secret
      - equal:
          path: spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.key
          value: username
      - equal:
          path: spec.template.spec.containers[0].env[4].valueFrom.secretKeyRef.name
          value: authentik-db-secret
      - equal:
          path: spec.template.spec.containers[0].env[4].valueFrom.secretKeyRef.key
          value: password

  - it: should set PGDATA to a subdirectory of the data mount
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[6].name
          value: PGDATA
      - equal:
          path: spec.template.spec.containers[0].env[6].value
          value: /var/lib/postgresql/data/pgdata

  - it: should mount data volume to the correct path
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: data
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /var/lib/postgresql/data

  - it: should mount init scripts to docker-entrypoint-initdb.d
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: init
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /docker-entrypoint-initdb.d

  - it: should use PVC access mode ReadWriteOnce
    documentIndex: 4
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.accessModes[0]
          value: ReadWriteOnce

  - it: should reference the configmap in the init volume
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: postgres-init
      - equal:
          path: spec.template.spec.volumes[0].configMap.defaultMode
          value: 365

  - it: should have matching selectors across deployment and services
    documentIndex: 4
    asserts:
      - equal:
          path: spec.selector.matchLabels.app
          value: postgres

  - it: should select the same app label in ClusterIP service
    documentIndex: 5
    asserts:
      - equal:
          path: spec.selector.app
          value: postgres

  - it: should select the same app label in LoadBalancer service
    documentIndex: 6
    asserts:
      - equal:
          path: spec.selector.app
          value: postgres

  - it: should set all resources in the release namespace
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: NAMESPACE
    release:
      namespace: NAMESPACE

  - it: should use readiness probe with pg_isready
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.exec.command
          value: ["pg_isready", "-U", "postgres"]
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 10
