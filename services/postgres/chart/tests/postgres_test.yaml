suite: postgres deployment
templates:
  - templates/postgres.yaml
tests:
  - it: should create a secret with postgres credentials
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: postgres-secret
      - equal:
          path: stringData.username
          value: postgres

  - it: should create a configmap with init scripts
    documentIndex: 1
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: postgres-init

  - it: should create a 4Gi PVC with longhorn storage class
    documentIndex: 2
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: postgres-pvc
      - equal:
          path: spec.storageClassName
          value: longhorn
      - equal:
          path: spec.resources.requests.storage
          value: 4Gi

  - it: should create a deployment with postgres 17 image
    documentIndex: 3
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].image
          value: "postgres:17"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5432

  - it: should have a readiness probe
    documentIndex: 3
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should mount data and init volumes
    documentIndex: 3
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 2

  - it: should create a ClusterIP service
    documentIndex: 4
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: postgres
      - isNull:
          path: spec.type

  - it: should create a LoadBalancer service
    documentIndex: 5
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: postgres-lb
      - equal:
          path: spec.type
          value: LoadBalancer
