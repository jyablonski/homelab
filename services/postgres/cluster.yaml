# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/main/config/crd/bases/postgresql.cnpg.io_clusters.yaml

# this cluster.yaml file installs postgres into the "postgres" namespace, which is created in the helmfile postsync hook.

# Raw CNPG Cluster CR instead of using the cnpg/cluster helm chart.
# The chart (v0.5.0) has two bugs that make it unusable:
#   1. In standalone mode, _external_clusters.tpl renders "externalClusters:" with
#      no value, producing null which fails CRD validation.
#   2. _bootstrap.tpl uses toYaml on the initdb object, which mangles multiline
#      YAML block scalars (the | syntax) and breaks parsing.
# So we apply this manifest directly via kubectl in the helmfile postsync hook.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17

  storage:
    size: 4Gi
    storageClass: longhorn

  # CNPG disables the postgres superuser by default and only creates an
  # unprivileged app user. We need superuser access to CREATE DATABASE/USER
  # in postInitSQL and for general admin access from outside the cluster.
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret

  postgresql:
    # CNPG's default pg_hba only allows local/peer auth and replication
    # connections. Without this rule, any TCP connection (from other pods or
    # the LoadBalancer) is rejected. md5 enables password auth over the network.
    pg_hba:
      - host all all 0.0.0.0/0 md5

  bootstrap:
    initdb:
      database: app
      owner: jacob
      # These run as individual statements against the "postgres" db, outside a
      # transaction block. CREATE DATABASE/USER cannot run inside a transaction,
      # which is why they can't go in bootstrap.sql (postInitSQLRefs wraps
      # everything in a transaction).
      postInitSQL:
        - CREATE DATABASE authentik
        - CREATE USER authentik WITH PASSWORD 'password'
        - GRANT ALL PRIVILEGES ON DATABASE authentik TO authentik
        - ALTER DATABASE authentik OWNER TO authentik
      # bootstrap.sql runs against the "app" database (the initdb.database).
      # Contains schema/table setup only -- no CREATE DATABASE statements.
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgres-bootstrap
            key: bootstrap.sql

  # CNPG only creates ClusterIP services by default (postgres-rw, postgres-ro,
  # postgres-r), which are only reachable from inside the cluster. This adds a
  # LoadBalancer service (via MetalLB) so we can connect to postgres from the
  # host machine using tools like psql, pgAdmin, DataGrip, etc.
  # selectorType: rw routes to the primary (read-write) instance.
  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: postgres-lb
            spec:
              type: LoadBalancer
              ports:
                - name: postgresql
                  port: 5432
                  targetPort: 5432
                  protocol: TCP
