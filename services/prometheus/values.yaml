prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
  service:
    type: ClusterIP
    port: 9090
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.home
    paths:
      - /
    pathType: Prefix

alertmanager:
  enabled: false

pushgateway:
  enabled: false

grafana:
  service:
    type: ClusterIP
    port: 3000
  envValueFrom:
    # Created by terraform/authentik.tf as kubernetes_secret_v1.grafana_oauth.
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-oauth-secret
        key: client_id
        optional: true
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth-secret
        key: client_secret
        optional: true
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.home
  grafana.ini:
    server:
      root_url: http://grafana.home
    users:
      allow_sign_up: false
      allow_password_change: false
    security:
      disable_initial_admin_password_change: true
    auth:
      disable_login_form: false
      disable_signout_menu: false
      allow_user_sign_up: false
      allow_user_org_create: false
    auth.anonymous:
      enabled: false
      org_role: Viewer
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      scopes: openid email profile
      auth_url: http://authentik.home/application/o/authorize/
      token_url: http://authentik-server.authentik.svc.cluster.local/application/o/token/
      api_url: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
  additionalDataSources:
    - name: Loki
      type: loki
      uid: Loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
