prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
  service:
    type: ClusterIP
    port: 9090
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.home
    paths:
      - /
    pathType: Prefix

alertmanager:
  enabled: false

pushgateway:
  enabled: false

grafana:
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.home
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
