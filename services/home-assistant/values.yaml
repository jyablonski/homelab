persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: longhorn

controller:
  type: StatefulSet

hostNetwork: false
hostPort:
  enabled: false

service:
  type: ClusterIP
  port: 8123

ingress:
  enabled: true
  external: false
  className: traefik
  hosts:
    - host: homeassistant.home
      paths:
        - path: /
          pathType: Prefix

serviceMonitor:
  enabled: true
  scrapeInterval: 30s
  labels:
    release: prometheus

configuration:
  enabled: true
  # Force merge of the chart-managed Prometheus integration into an existing
  # configuration.yaml so the ServiceMonitor has a real endpoint.
  forceInit: true
  trusted_proxies:
    - 10.42.0.0/16
  templateConfig: |-
    # Loads default set of integrations. Do not remove.
    default_config:

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        {{- range .Values.configuration.trusted_proxies }}
        - {{ . }}
        {{- end }}

    frontend:
      themes: !include_dir_merge_named themes

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

    prometheus:
      requires_auth: false

# TODO: leave at 1 even in HA, home assistant is stateful because the local devices
# can only connect to 1 instance. the HA lives in longhorn storing the data w/ multiple
# replicas incase of failure.
replicaCount: 1
