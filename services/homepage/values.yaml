# gethomepage dashboard at http://apps.home — discovers services from
# ingresses annotated with gethomepage.dev/* (see other values files).
# Requires sole ownership of the host: its frontend fetches data from
# same-origin /api/* paths, so nothing else can claim a path prefix here
# (apps live on their own <app>.home hosts).
controllers:
  main:
    replicas: 1
    serviceAccount:
      identifier: homepage
    containers:
      main:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.13.2
          pullPolicy: IfNotPresent
        env:
          # Host header allowlist; requests with other hosts get HTTP 400.
          HOMEPAGE_ALLOWED_HOSTS: apps.home
          LOG_LEVEL: info
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        # TCP probes: HTTP probes send the pod IP as Host header, which the
        # HOMEPAGE_ALLOWED_HOSTS check rejects.
        probes:
          liveness:
            enabled: true
            type: TCP
          readiness:
            enabled: true
            type: TCP
          startup:
            enabled: true
            type: TCP
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 512Mi

serviceAccount:
  homepage: {}

rbac:
  roles:
    homepage:
      type: ClusterRole
      rules:
        - apiGroups: [""]
          resources: ["namespaces", "pods", "nodes"]
          verbs: ["get", "list"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["ingresses"]
          verbs: ["get", "list"]
        - apiGroups: ["metrics.k8s.io"]
          resources: ["nodes", "pods"]
          verbs: ["get", "list"]
  bindings:
    homepage:
      type: ClusterRoleBinding
      roleRef:
        identifier: homepage
      subjects:
        - identifier: homepage

configMaps:
  config:
    data:
      settings.yaml: |
        title: Homelab
        hideVersion: true
        layout:
          Apps:
          Monitoring:
          Infrastructure:
          Home Automation:
      kubernetes.yaml: |
        mode: cluster
      services.yaml: |
        # Populated automatically from ingresses with gethomepage.dev/* annotations.
      widgets.yaml: |
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: homelab
            nodes:
              show: false
      bookmarks.yaml: |
        - Cluster:
            - Registry catalog:
                - abbr: RG
                  href: http://registry.home:5000/v2/_catalog
      docker.yaml: ""

persistence:
  config:
    type: configMap
    identifier: config
    globalMounts:
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/kubernetes.yaml
        subPath: kubernetes.yaml
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
      - path: /app/config/docker.yaml
        subPath: docker.yaml
  # homepage writes request logs under /app/config/logs; the configMap mount
  # above is read-only, so give it a writable scratch dir.
  logs:
    type: emptyDir
    globalMounts:
      - path: /app/config/logs

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 3000
        targetPort: 3000
        protocol: TCP

ingress:
  main:
    className: traefik
    hosts:
      - host: apps.home
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
