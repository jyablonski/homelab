service:
  type: ClusterIP
  port: 8085

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: headlamp.home
      paths:
        - path: /
          type: Prefix

config:
  pluginsDir: ""

extraArgs:
  - "-insecure"

clusterRoleBinding:
  create: true

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
