controllers:
  main:
    type: statefulset
    replicas: 1
    containers:
      main:
        image:
          repository: eclipse-mosquitto
          tag: 2.0.22
          pullPolicy: IfNotPresent
        args:
          - mosquitto
          - -c
          - /mosquitto/config/mosquitto.conf
        ports:
          - name: mqtt
            containerPort: 1883
            protocol: TCP
        probes:
          liveness:
            enabled: true
            type: TCP
          readiness:
            enabled: true
            type: TCP
          startup:
            enabled: true
            type: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

defaultPodOptions:
  securityContext:
    fsGroup: 1883
    fsGroupChangePolicy: OnRootMismatch

configMaps:
  config:
    data:
      mosquitto.conf: |
        listener 1883 0.0.0.0
        allow_anonymous true
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      mqtt:
        port: 1883
        targetPort: 1883
        protocol: TCP

persistence:
  config:
    type: configMap
    identifier: config
    globalMounts:
      - path: /mosquitto/config/mosquitto.conf
        subPath: mosquitto.conf
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /mosquitto/data
