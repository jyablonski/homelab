repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ".*/chart/templates/.*"
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.7.4
    hooks:
      - id: prettier
        types_or: [yaml, markdown]
        exclude: ".*/chart/templates/.*"
  - repo: local
    hooks:
      - id: validate-fast
        name: make validate-fast
        entry: make validate-fast
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: validate
        name: make validate
        entry: make validate
        language: system
        pass_filenames: false
        stages: [pre-push]
