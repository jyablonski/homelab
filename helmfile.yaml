repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: pajikos
    url: http://pajikos.github.io/home-assistant-helm-chart/
  - name: mojo2600
    url: https://mojo2600.github.io/pihole-kubernetes/
  - name: metallb
    url: https://metallb.github.io/metallb
  - name: longhorn
    url: https://charts.longhorn.io
  - name: traefik
    url: https://traefik.github.io/charts
  - name: authentik
    url: https://charts.goauthentik.io
  - name: twuni
    url: https://twuni.github.io/docker-registry.helm
  - name: bjw-s
    url: https://bjw-s-labs.github.io/helm-charts
releases:
  - name: prometheus-operator
    namespace: monitoring
    createNamespace: true
    labels:
      bootstrap: infra
    chart: prometheus-community/kube-prometheus-stack
    version: 82.10.2
    values:
      - services/prometheus/values.yaml
    secrets:
      - services/prometheus/secrets.sops.yaml
    hooks:
      - events:
          - postsync
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - services/grafana/dashboards/

  - name: loki
    namespace: monitoring
    labels:
      bootstrap: infra
    chart: grafana/loki
    version: 6.53.0
    values:
      - services/loki/values.yaml

  - name: promtail
    namespace: monitoring
    labels:
      bootstrap: infra
    chart: grafana/promtail
    version: 6.17.1
    values:
      - services/promtail/values.yaml

  - name: postgres
    namespace: postgres
    createNamespace: true
    labels:
      bootstrap: infra
    chart: ./services/postgres/chart
    secrets:
      - services/postgres/secrets.sops.yaml
    needs:
      - longhorn-system/longhorn
    wait: true

  - name: home-assistant
    namespace: home-automation
    createNamespace: true
    labels:
      bootstrap: infra
    chart: pajikos/home-assistant
    version: 0.3.47
    values:
      - services/home-assistant/values.yaml
    needs:
      - home-automation/mosquitto
      - monitoring/prometheus-operator

  - name: mosquitto
    namespace: home-automation
    createNamespace: true
    labels:
      bootstrap: infra
    chart: bjw-s/app-template
    version: 4.6.2
    values:
      - services/mosquitto/values.yaml
    needs:
      - longhorn-system/longhorn
    wait: true

  - name: zigbee2mqtt
    installed: false
    namespace: home-automation
    createNamespace: true
    labels:
      bootstrap: infra
    chart: bjw-s/app-template
    version: 4.6.2
    values:
      - services/zigbee2mqtt/values.yaml
    needs:
      - home-automation/mosquitto
      - kube-system/traefik
      - longhorn-system/longhorn
    wait: true

  - name: openthread-border-router
    installed: false
    namespace: home-automation
    createNamespace: true
    labels:
      bootstrap: infra
    chart: bjw-s/app-template
    version: 4.6.2
    values:
      - services/openthread-border-router/values.yaml
    needs:
      - kube-system/traefik

  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    labels:
      bootstrap: infra
    chart: longhorn/longhorn
    version: 1.11.0
    values:
      - services/longhorn/values.yaml

  - name: registry
    namespace: registry
    createNamespace: true
    labels:
      bootstrap: infra
    chart: twuni/docker-registry
    version: 3.0.0
    values:
      - services/registry/values.yaml
    needs:
      - longhorn-system/longhorn
      - metallb-system/metallb
      - monitoring/prometheus-operator
    wait: true

  - name: pihole
    namespace: pihole
    createNamespace: true
    labels:
      bootstrap: infra
    chart: mojo2600/pihole
    version: 2.35.0
    values:
      - services/pihole/values.yaml
    secrets:
      - services/pihole/secrets.sops.yaml
    needs:
      - longhorn-system/longhorn
      - metallb-system/metallb
      - kube-system/traefik
    wait: true

  - name: workload-chart-example
    namespace: apps
    createNamespace: true
    labels:
      bootstrap: app
    chart: ./charts/workload
    values:
      - apps/workload-chart-example/values.yaml
    needs:
      - monitoring/prometheus-operator
      - registry/registry

  - name: api
    namespace: apps
    labels:
      bootstrap: app
    chart: ./charts/workload
    values:
      - apps/api/values.yaml
    secrets:
      - apps/api/secrets.sops.yaml
    needs:
      - monitoring/prometheus-operator
      - postgres/postgres
      - registry/registry

  - name: runner
    namespace: apps
    createNamespace: true
    labels:
      bootstrap: app
    chart: ./charts/workload
    values:
      - apps/runner/values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: bash
        args:
          - -c
          - |
            kubectl create namespace apps --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -f apps/runner/rbac.yaml
    needs:
      - registry/registry

  - name: django
    namespace: apps
    labels:
      bootstrap: app
    chart: ./charts/workload
    missingFileHandler: Warn
    values:
      - apps/django/values.yaml
    secrets:
      - apps/django/secrets.sops.yaml
    needs:
      - postgres/postgres
      - registry/registry

  - name: traefik
    namespace: kube-system
    labels:
      bootstrap: infra
    chart: traefik/traefik
    version: 39.0.5
    values:
      - services/traefik/values.yaml

  - name: metallb
    namespace: metallb-system
    createNamespace: true
    labels:
      bootstrap: infra
    chart: metallb/metallb
    version: 0.15.3
    values:
      - services/metallb/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: bash
        args:
          - -c
          - |
            echo "Waiting for MetalLB webhook to be ready..."
            kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=controller -n metallb-system --timeout=60s
            kubectl apply -f services/metallb/ip-pool.yaml

  - name: authentik
    namespace: authentik
    createNamespace: true
    labels:
      bootstrap: infra
    chart: authentik/authentik
    version: 2026.2.1
    values:
      - services/authentik/values.yaml
    secrets:
      - services/authentik/secrets.sops.yaml
    needs:
      - postgres/postgres
