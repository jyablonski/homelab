# Webserver and daemon load user code from the baked-in module (same image as
# the optional gRPC code server). Scheduled runs execute step subprocesses on
# the daemon pod; loading locally avoids hangs when the code server restarts.
load_from:
  - python_module:
      module_name: dagster_project.definitions
      location_name: dagster_project
      working_directory: /app
