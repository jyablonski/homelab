scale:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

env:
  PORT: "8080"

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  periodSeconds: 20
  failureThreshold: 3

service:
  port: 8080

# Available at http://workload-chart.home
ingress:
  enabled: true
  className: traefik
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Workload Example"
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "mdi-cube-outline"
    gethomepage.dev/href: "http://workload-chart.home/health/ready"
    gethomepage.dev/description: "Go reference workload"
  hosts:
    - host: workload-chart.home
      paths:
        - path: /
          pathType: Prefix
  traefik:
    stripPrefix:
      enabled: false

serviceMonitor:
  enabled: true
