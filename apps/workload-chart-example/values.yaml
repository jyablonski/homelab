scale:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

env:
  PORT: "8080"

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  periodSeconds: 20
  failureThreshold: 3

service:
  port: 8080

# Available at http://apps.home/workload-chart/api
ingress:
  enabled: true
  className: traefik
  hosts:
    - host: apps.home
      paths:
        - path: /workload-chart/api
          pathType: Prefix
  traefik:
    stripPrefix:
      enabled: true
      prefixes:
        - /workload-chart/api

serviceMonitor:
  enabled: true
