image:
  repository: registry.home:5000/homelab/workload-chart-example
  tag: "dev"
  pullPolicy: Always

replicaCount: 2

containerPort: 8080

env:
  PORT: "8080"

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  periodSeconds: 20
  failureThreshold: 3

service:
  enabled: true
  type: ClusterIP
  port: 8080

# this means the app will be available at http://apps.home/workload-chart/api
ingress:
  enabled: true
  className: traefik
  hosts:
    - host: apps.home
      paths:
        - path: /workload-chart/api
          pathType: Prefix
  traefik:
    stripPrefix:
      enabled: true
      prefixes:
        - /workload-chart/api

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
  labels:
    release: prometheus

podLabels:
  app.kubernetes.io/component: api
