env:
  RUNNER_ENVIRONMENT: "production"
  RUNNER_NAMESPACE: "apps"
  RUNNER_URL_PREFIX: "/runner"
  RUNNER_SSO_ENABLED: "true"
  RUNNER_SSO_ALLOWED_GROUP: "homelab-admins"
  RUNNER_GRAFANA_BASE_URL: "http://grafana.home"
  RUNNER_CLUSTER_NAME: "homelab-prod"
  # Grafana Loki datasource UID (Connections → Data sources → Loki → UID in the URL)
  RUNNER_LOKI_DATASOURCE_UID: "P8E80F9AEF21F6940"

secretEnv:
  - name: RUNNER_OIDC_CLIENT_ID
    secretName: runner-oauth-secret
    secretKey: OIDC_CLIENT_ID
    optional: true
  - name: RUNNER_OIDC_CLIENT_SECRET
    secretName: runner-oauth-secret
    secretKey: OIDC_CLIENT_SECRET
    optional: true
  - name: RUNNER_OIDC_ISSUER_URL
    secretName: runner-oauth-secret
    secretKey: OIDC_ISSUER_URL
    optional: true
  - name: RUNNER_OIDC_AUTHORIZE_URL
    secretName: runner-oauth-secret
    secretKey: OIDC_AUTHORIZE_URL
    optional: true
  - name: RUNNER_OIDC_TOKEN_URL
    secretName: runner-oauth-secret
    secretKey: OIDC_TOKEN_URL
    optional: true
  - name: RUNNER_OIDC_USERINFO_URL
    secretName: runner-oauth-secret
    secretKey: OIDC_USERINFO_URL
    optional: true
  - name: RUNNER_OIDC_JWKS_URL
    secretName: runner-oauth-secret
    secretKey: OIDC_JWKS_URL
    optional: true
  - name: RUNNER_OIDC_SCOPES
    secretName: runner-oauth-secret
    secretKey: OIDC_SCOPES
    optional: true
  - name: RUNNER_OIDC_CALLBACK_URL
    secretName: runner-oauth-secret
    secretKey: OIDC_CALLBACK_URL
    optional: true
  - name: RUNNER_SESSION_SECRET_KEY
    secretName: runner-oauth-secret
    secretKey: SESSION_SECRET_KEY
    optional: true

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 20
  failureThreshold: 3

serviceAccount:
  create: true
  name: runner
  automount: true

service:
  port: 8080

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: apps.home
      paths:
        - path: /runner
          pathType: Prefix
  traefik:
    stripPrefix:
      enabled: true
      prefixes:
        - /runner

serviceMonitor:
  enabled: true
