env:
  API_ENV: "production"
  API_LOG_LEVEL: "INFO"
  API_ROOT_PATH: "/api"
  API_WAIT_FOR_DB: "true"
  DB_CONNECT_TIMEOUT: "5"
  DB_HOST: "postgres.postgres.svc.cluster.local"
  DB_NAME: "postgres"
  DB_PORT: "5432"
  DB_SEARCH_PATH: "source,public"

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 20
  failureThreshold: 3

service:
  port: 8000

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: apps.home
      paths:
        - path: /api
          pathType: Prefix
  traefik:
    stripPrefix:
      enabled: true
      prefixes:
        - /api

serviceMonitor:
  enabled: true

jobs:
  print-reminders-rows:
    enabled: true
    runnable: true
    suspend: true
    description: Print reminder table row count
    command: ["python"]
    args: ["/app/jobs/print-reminders-rows/main.py"]
