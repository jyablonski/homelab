apiVersion: batch/v1
kind: CronJob
metadata:
  name: utc-logger
  namespace: default
spec:
  schedule: "*/1 * * * *" # runs every minute
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: utc-logger
        spec:
          containers:
            - name: utc-logger
              image: registry.home:5000/homelab/go-cron-test:dev
              imagePullPolicy: Always
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
          restartPolicy: OnFailure
